name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Avoid piling up concurrent runs on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4  # 2026-06-16 后 GitHub 默认 Node 24, 此处尚能跑, 后续统一升 v5

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Cache uv environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies (sync from pyproject.toml + uv.lock)
        # `uv sync` 与 pyproject.toml / uv.lock 同源,杜绝手抄列表与声明不同步;
        # 重型 OCR / 浏览器自动化已移到 [project.optional-dependencies] 的 ocr / scraper extras,默认不装.
        run: uv sync --extra dev

      - name: Smoke import — confirm the app module loads
        run: |
          uv run python -c "from app.main import app; print('app import OK,', len(app.routes), 'routes')"
          uv run python -c "from app.services.sales_ledger import DeepSeekClient, DocumentParser, SalesLedgerSynthesizer, RevenueAnalyzer; print('sales_ledger OK')"
          uv run python -c "from app.services.contract_analysis import ContractAnalyzer; print('contract_analysis OK')"
          uv run python -c "from app.services.sentiment.scheduler import start_scheduler, stop_scheduler; print('sentiment OK')"
          uv run python -c "from app.services.inventory.aging_engine import InventoryAgingEngine; print('inventory OK')"
          uv run python -c "from app.services.confirmation.letter_generator import ConfirmationLetterGenerator; print('confirmation OK')"
          uv run python -c "from app.services.knowledge_base.service import KnowledgeBaseService; print('knowledge_base OK')"
          uv run python -c "from app.services.team_management.service import TeamManagementService; print('team_management OK')"
          uv run python -c "from app.services.comprehensive.template_parser import TemplateParser; print('comprehensive OK')"

      - name: Run pytest
        env:
          PYTHONUTF8: "1"   # CI 在 Linux 上一般无碍,Windows 兼容性也带上
        run: uv run pytest tests/ -v --tb=short

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check app/ frontend/ tests/
        continue-on-error: true   # Don't fail the build on style; warn only

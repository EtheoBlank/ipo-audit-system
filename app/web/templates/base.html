<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}{{ app_name }}{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
  .nav-link { @apply px-3 py-2 rounded-md text-sm font-medium; }
  .nav-link.active { @apply bg-blue-600 text-white; }
  .nav-link:not(.active) { @apply text-gray-700 hover:bg-gray-100; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">
<nav class="bg-white border-b border-gray-200 shadow-sm">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <a href="/" class="text-lg font-bold text-gray-900 flex items-center gap-2">
      <span class="text-2xl">🏛️</span>
      <span>{{ app_name }}</span>
      <span class="text-xs text-gray-500 ml-2">v{{ app_version|default('0.1.0') }}</span>
    </a>
    <div class="flex gap-1">
      <a href="/" class="nav-link {% if current_path == '/' %}active{% endif %}">首页</a>
      <a href="/projects" class="nav-link {% if current_path == '/projects' %}active{% endif %}">项目</a>
      <a href="/knowledge-base" class="nav-link {% if current_path == '/knowledge-base' %}active{% endif %}">知识库</a>
      <a href="/docs" target="_blank" class="nav-link">API 文档 ↗</a>
    </div>
  </div>
</nav>

<main class="max-w-6xl mx-auto px-4 py-8">
{% block content %}{% endblock %}
</main>

<footer class="max-w-6xl mx-auto px-4 py-6 text-center text-sm text-gray-500">
  Deployed on Vercel · GitHub push master triggers auto-rebuild
</footer>
</body>
</html>
